[dialogue]
preset = bw

[dialogue.bw]
font_family = Georgia, serif
font_size = 52
color = #ffffff
opacity = 0.95
align = center
x = 0.10
y = 0.70
width = 0.80
height = 0.20
word_timing = 0.22

box_enabled = true
box_color = #000000
box_opacity = 0.35
box_padding = 24
box_border_radius = 8

current_word_font_size_adjust = 3
current_word_highlight_enabled = true
current_word_highlight_color = #cccccc
current_word_highlight_opacity = 0.30
current_word_highlight_pad_left = 6
current_word_highlight_pad_right = 6
current_word_highlight_pad_top = 3
current_word_highlight_pad_bottom = 3